name: Test, Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Show environment and scripts
        run: |
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "workspace files:"
          ls -la | sed -n '1,200p'
          echo "-- package.json build script --"
          node -e "const p=require('./package.json'); console.log(p.scripts && p.scripts.build)"
          echo "-- head of polyfill script --"
          head -n 50 ./scripts/polyfill-crypto.cjs || true

      - name: Run tests
        run: npm test --silent

  build-and-deploy:
    name: Build and deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Show build output
        run: |
          echo "Working directory: $(pwd)"
          ls -la
          if [ -d docs ]; then
            echo "docs exists:"
            ls -la docs | sed -n '1,200p'
            echo "First 20 lines of docs/index.html:"
            head -n 20 docs/index.html || true
          else
            echo "docs directory missing"
            exit 1
          fi

      - name: Upload build artifact (docs)
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: ./docs

      - name: Deploy to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
